name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Job names must match REQUIRED_CHECKS in the orchestrator exactly.
  # orchestrator/src/orchestrator.py polls for these check run names.

  protected-path-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check protected test path is not modified
        run: |
          set -euo pipefail
          # Only enforce on PRs — direct pushes to main are orchestrator
          # acceptance-test commits, which are allowed to modify tests/acceptance/.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "SKIP: Not a PR — orchestrator commits to main are exempt."
            exit 0
          fi
          PROTECTED="tests/acceptance"
          echo "Checking that no files under '$PROTECTED' were modified..."
          BASE="${{ github.event.pull_request.base.sha }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD || true)
          if echo "$CHANGED" | grep -q "^${PROTECTED}/"; then
            echo "FAIL: protected test path was modified:"
            echo "$CHANGED" | grep "^${PROTECTED}/"
            exit 1
          fi
          echo "PASS: protected test path not modified"

  unit-tests:
    runs-on: ubuntu-latest
    needs: protected-path-guard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v --tb=short

  lint:
    runs-on: ubuntu-latest
    needs: protected-path-guard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    needs: protected-path-guard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mypy and package
        run: |
          pip install mypy
          pip install -e .

      - name: Run mypy
        run: mypy src/

  build:
    runs-on: ubuntu-latest
    needs: [unit-tests, lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

  security-scan:
    runs-on: ubuntu-latest
    needs: protected-path-guard
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit (SAST)
        run: bandit -r src/ -ll || true

      - name: Check diff for secrets
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="HEAD~1"
          fi
          DIFF=$(git diff "$BASE"...HEAD 2>/dev/null || git diff HEAD~1 HEAD || true)
          if echo "$DIFF" | grep -qE '(glc_|ghp_|gho_|sk-|AKIA[A-Z0-9]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----)'; then
            echo "FAIL: potential secret detected in diff"
            exit 1
          fi
          echo "PASS: no secrets detected"

