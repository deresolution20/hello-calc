[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hello-calc"
version = "0.1.0"
description = "A tiny Python arithmetic library used to test the agentic build platform end-to-end."
authors = [
    { name="Your Name", email="your.email@example.com" }
]
dependencies = ["python >= 3.9"]

[tool.ruff]
line-length = 88
target-version = "py39"

[tool.mypy]
strict = true

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
    "mypy"
]

